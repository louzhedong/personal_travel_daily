services:
  mysql:
    image: mysql:8.4
    container_name: personal_travel_daily_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: personal_travel_daily
      MYSQL_USER: travel_app
      MYSQL_PASSWORD: travel_app_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-p$$MYSQL_ROOT_PASSWORD']
      interval: 10s
      timeout: 5s
      retries: 12

  adminer:
    image: adminer:4
    container_name: personal_travel_daily_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
